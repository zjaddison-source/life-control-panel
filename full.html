<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Full Control Panel</title>
https://cdn.tailwindcss.comscript>
</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-5xl mx-auto space-y-6">

<!-- Header -->
<div class="flex justify-between items-center">
  <h1 class="text-3xl font-bold">Full Control Panel</h1>
  →
    ← Back
  </a>
</div>

<!-- Identity -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <div class="text-sm text-slate-400">Identity</div>
  <div class="text-xl font-semibold">
    I don’t break promises to myself.
  </div>
</div>

<!-- Grid + Score Row -->
<div class="grid md:grid-cols-2 gap-6">

  <!-- Today -->
  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-lg font-semibold mb-2">Today</h2>

    <div class="space-y-2">
      <label><input type="checkbox" id="body"> Body</label><br>
      <label><input type="checkbox" id="sobriety"> Sobriety</label><br>
      <label><input type="checkbox" id="career"> Career</label><br>
      <label><input type="checkbox" id="mind"> Mind</label>
    </div>

    <div class="mt-3 text-lg">
      Score: <span id="score">0</span>/4
    </div>
  </div>

  <!-- Mood -->
  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-lg font-semibold mb-2">Mood</h2>

    <input type="range" min="1" max="5" id="mood" class="w-full">

    <div class="mt-2">
      Level: <span id="moodValue"></span>
    </div>
  </div>

</div>

<!-- 90 Day Grid -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-lg font-semibold mb-2">90-Day Grid</h2>

  <div id="grid" class="grid grid-cols-10 gap-1"></div>
</div>

<!-- Reflection -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-lg font-semibold mb-2">Reflection</h2>

  <textarea id="notes"
    class="w-full p-2 rounded text-black"
    placeholder="What mattered, what slipped, one adjustment">
  </textarea>
</div>

</div>

<!-- SCRIPT STAYS THE SAME -->

<!-- Back -->
<div>
  <a href="/" class="text-blue-400 underline">← Back to simple dashboard</a>
</div>

</div>

<script>
const boxes = ["body","sobriety","career","mind"];
const scoreEl = document.getElementById("score");
const grid = document.getElementById("grid");
const mood = document.getElementById("mood");
const moodValue = document.getElementById("moodValue");
const notes = document.getElementById("notes");

// Load state
boxes.forEach(id => {
  if(localStorage.getItem(id)==="true"){
    document.getElementById(id).checked = true;
  }
});

notes.value = localStorage.getItem("notes") || "";
mood.value = localStorage.getItem("mood") || 3;
moodValue.textContent = mood.value;

// Save notes
notes.addEventListener("input",()=>{
  localStorage.setItem("notes",notes.value);
});

// Save mood
mood.addEventListener("input",()=>{
  localStorage.setItem("mood",mood.value);
  moodValue.textContent = mood.value;
});

// Handle checkboxes
boxes.forEach(id=>{
  document.getElementById(id).addEventListener("change",()=>{
    localStorage.setItem(id,document.getElementById(id).checked);
    updateScore();
    updateGrid();
  });
});

function updateScore(){
  let score = 0;
  boxes.forEach(id=>{
    if(document.getElementById(id).checked) score++;
  });
  scoreEl.textContent = score;
  localStorage.setItem("todayScore",score);
}

// Build 90-day grid
function buildGrid(){
  grid.innerHTML = "";

  for(let i=1;i<=90;i++){
    const cell = document.createElement("div");

    const score = parseInt(localStorage.getItem("day"+i) || "0");

    let color = "bg-slate-800";

    if(score === 4) color = "bg-emerald-400";
    else if(score === 3) color = "bg-emerald-600";
    else if(score === 2) color = "bg-amber-500";
    else if(score === 1) color = "bg-rose-500";

    cell.className = `h-6 w-6 rounded ${color} transition transform hover:scale-110`;

    cell.title = `Day ${i} — Score: ${score}/4`;

    grid.appendChild(cell);
  }
}


// Track today's progress into grid
function updateGrid(){
  let currentDay = parseInt(localStorage.getItem("currentDay")||"1");
  let score = localStorage.getItem("todayScore")||0;

  localStorage.setItem("day"+currentDay,score);
}

updateScore();
buildGrid();
</script>

</body>
</html>
