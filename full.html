<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Full Control Panel</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-5xl mx-auto space-y-6">

<!-- Header -->
<div class="flex justify-between items-center">
  <h1 class="text-3xl font-bold">Full Control Panel</h1>
  <a href="/" class="text-sm text-emerald-300">← Back</a>
</div>

<!-- Today -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-lg font-semibold mb-2">Today</h2>

  <label><input type="checkbox" id="body"> Body</label><br>
  <label><input type="checkbox" id="sobriety"> Sobriety</label><br>
  <label><input type="checkbox" id="career"> Career</label><br>
  <label><input type="checkbox" id="mind"> Mind</label>

  <div class="mt-3 text-lg">
    Score: <span id="score">0</span>/4
    <button
onclick="nextDay()" 
class="mt-3 px-3 py-1 bg-blue-500 rounded hover:bg-blue-600">
Complete Day →
</button>
  </div>
</div>

<!-- Grid -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-lg font-semibold mb-2">90-Day Grid</h2>
  <div id="grid" class="grid grid-cols-10 gap-1"></div>
</div>

</div>

<script>
const boxes = ["body","sobriety","career","mind"];
const scoreEl = document.getElementById("score");
const grid = document.getElementById("grid");

// BEGIN SAFE BASELINE
// Reset data if needed (prevents broken state)
if(!localStorage.getItem("initialized")){
  localStorage.setItem("currentDay","1");
  localStorage.setItem("initialized","true");
}

let currentDay = parseInt(localStorage.getItem("currentDay"));

// Load checkbox state
boxes.forEach(id => {
  if(localStorage.getItem(id)==="true"){
    document.getElementById(id).checked = true;
  }
});

// Checkbox listeners
boxes.forEach(id => {
  document.getElementById(id).addEventListener("change",()=>{
    localStorage.setItem(id,document.getElementById(id).checked);
    updateScore();
  });
});

// Calculate score
function updateScore(){
  let score = 0;

  boxes.forEach(id=>{
    if(document.getElementById(id).checked) score++;
  });

  scoreEl.textContent = score;

  localStorage.setItem("day"+currentDay,score);

  buildGrid();
}

// BUILD GRID (guaranteed render)
function buildGrid(){
  grid.innerHTML = "";

  for(let i=1;i<=90;i++){
    const cell = document.createElement("div");

    const score = parseInt(localStorage.getItem("day"+i) || "0");

    let color = "bg-slate-700";

    if(score === 4) color = "bg-emerald-400";
    else if(score === 3) color = "bg-emerald-600";
    else if(score === 2) color = "bg-amber-500";
    else if(score === 1) color = "bg-rose-500";

    const isToday = (i === currentDay);

let prevScore = parseInt(localStorage.getItem("day"+(i-1)) || "0");

let isStrong = score >= 3;
let wasStrong = prevScore >= 3;

// Strong streak = remove gap + square corners
let connectStyle = (isStrong && wasStrong)
  ? "rounded-none -ml-1"
  : "rounded";

// Regular spacing for non-streak cells
if(!isStrong) {
  connectStyle = "rounded";
}

cell.className =
  "h-6 w-6 " + connectStyle + " " + color + " " +
  (isToday ? "ring-2 ring-yellow-300" : "");

// INITIAL LOAD
updateScore();
buildGrid();


  function nextDay(){
  currentDay++;
  localStorage.setItem("currentDay", currentDay);

  // reset checkboxes
  boxes.forEach(id=>{
    document.getElementById(id).checked = false;
    localStorage.removeItem(id);
  });

  updateScore();
  buildGrid();

  alert("Day advanced. Keep going.");
}
</script>

</body>
</html>
