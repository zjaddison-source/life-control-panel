<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Full Control Panel</title>
https://cdn.tailwindcss.comscript>
</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-6xl mx-auto space-y-6">

<h1 class="text-3xl font-bold">Full Control Panel</h1>

<!-- Identity -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <div class="text-sm text-slate-400">Identity</div>
  <div class="text-xl font-semibold">
    I don’t break promises to myself.
  </div>
</div>

<!-- Today's Score -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-xl font-semibold mb-2">Today</h2>

  <div class="grid grid-cols-2 gap-2">
    <label><input type="checkbox" id="body"> Body</label>
    <label><input type="checkbox" id="sobriety"> Sobriety</label>
    <label><input type="checkbox" id="career"> Career</label>
    <label><input type="checkbox" id="mind"> Mind</label>
  </div>

  <div class="mt-3">Score: <span id="score">0</span>/4</div>
</div>

<!-- 90 Day Grid -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-xl font-semibold mb-2">90-Day Grid</h2>

  <div id="grid" class="grid grid-cols-10 gap-1"></div>
</div>

<!-- Mood -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <h2 class="text-xl font-semibold mb-2">Mood</h2>

  <input type="range" min="1" max="5" id="mood">
  <div>Mood Level: <span id="moodValue"></span></div>
</div>

<!-- Reflection -->
<div class="bg-slate-800 p-4 rounded-2xl">
  <textarea id="notes" class="w-full p-2 text-black rounded"
  placeholder="Reflection"></textarea>
</div>

<!-- Back -->
<div>
  <a href="/" class="text-blue-400 underline">← Back to simple dashboard</a>
</div>

</div>

<script>
const boxes = ["body","sobriety","career","mind"];
const scoreEl = document.getElementById("score");
const grid = document.getElementById("grid");
const mood = document.getElementById("mood");
const moodValue = document.getElementById("moodValue");
const notes = document.getElementById("notes");

// Load state
boxes.forEach(id => {
  if(localStorage.getItem(id)==="true"){
    document.getElementById(id).checked = true;
  }
});

notes.value = localStorage.getItem("notes") || "";
mood.value = localStorage.getItem("mood") || 3;
moodValue.textContent = mood.value;

// Save notes
notes.addEventListener("input",()=>{
  localStorage.setItem("notes",notes.value);
});

// Save mood
mood.addEventListener("input",()=>{
  localStorage.setItem("mood",mood.value);
  moodValue.textContent = mood.value;
});

// Handle checkboxes
boxes.forEach(id=>{
  document.getElementById(id).addEventListener("change",()=>{
    localStorage.setItem(id,document.getElementById(id).checked);
    updateScore();
    updateGrid();
  });
});

function updateScore(){
  let score = 0;
  boxes.forEach(id=>{
    if(document.getElementById(id).checked) score++;
  });
  scoreEl.textContent = score;
  localStorage.setItem("todayScore",score);
}

// Build 90-day grid
function buildGrid(){
  grid.innerHTML = "";
  for(let i=1;i<=90;i++){
    const cell = document.createElement("div");

    const score = localStorage.getItem("day"+i) || 0;

    cell.className = "h-6 w-6 rounded " +
      (score>=3 ? "bg-green-500" :
       score>=1 ? "bg-yellow-500" :
       "bg-slate-700");

    cell.title = "Day "+i+" Score:"+score;

    grid.appendChild(cell);
  }
}

// Track today's progress into grid
function updateGrid(){
  let currentDay = parseInt(localStorage.getItem("currentDay")||"1");
  let score = localStorage.getItem("todayScore")||0;

  localStorage.setItem("day"+currentDay,score);
}

updateScore();
buildGrid();
</script>

</body>
</html>
