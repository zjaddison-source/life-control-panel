<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>90-Day Life Control Panel</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-3xl mx-auto space-y-6">

  <h1 class="text-3xl font-bold">90-Day Life Control Panel</h1>

  <p class="text-slate-400">
    Simple. Daily. Honest. Protect the streak.
  </p>

  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">Today's Score</h2>

    <div class="space-y-2">

      <label><input type="checkbox" id="body"> Body (Workout)</label><br>
      <label><input type="checkbox" id="sobriety"> Sobriety</label><br>
      <label><input type="checkbox" id="career"> Career</label><br>
      <label><input type="checkbox" id="mind"> Mind</label>

    </div>

    <div class="mt-4 text-lg">
      Total: <span id="score">0</span>/4
    </div>
  </div>

  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">Reflection</h2>

    <textarea id="notes" class="w-full p-2 rounded text-black"
      placeholder="What mattered, what slipped, one adjustment"></textarea>
  </div>

  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">Identity</h2>

    <p id="identity">
      I don’t break promises to myself.
    </p>
  </div>

</div>

<script>

const boxes = ["body","sobriety","career","mind"];

const scoreEl = document.getElementById("score");

// Load saved state
boxes.forEach(id => {
  const saved = localStorage.getItem(id);
  if(saved === "true") {
    document.getElementById(id).checked = true;
  }
});

// Load notes
const notes = document.getElementById("notes");
notes.value = localStorage.getItem("notes") || "";

// Save notes
notes.addEventListener("input", () => {
  localStorage.setItem("notes", notes.value);
});

// Handle checkboxes
boxes.forEach(id => {
  const el = document.getElementById(id);

  el.addEventListener("change", () => {
    localStorage.setItem(id, el.checked);
    updateScore();
  });
});

function updateScore() {
  let score = 0;

  boxes.forEach(id => {
    if(document.getElementById(id).checked) score++;
  });

  scoreEl.textContent = score;
}

// Initialize score on load
updateScore();

</script>

</body>
</html>
