<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>90-Day Life Control Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-white p-6">

<div class="max-w-3xl mx-auto space-y-6">

  <h1 class="text-3xl font-bold">90-Day Life Control Panel</h1>

  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">Today's Score</h2>

    <div class="space-y-2">
      <label><input type="checkbox" id="body"> Body</label><br>
      <label><input type="checkbox" id="sobriety"> Sobriety</label><br>
      <label><input type="checkbox" id="career"> Career</label><br>
      <label><input type="checkbox" id="mind"> Mind</label>
    </div>

    <div class="mt-4 text-lg">
      Total: <span id="score">0</span>/4
    </div>

    <div class="mt-2 text-sm text-slate-400">
      Target: 3+ = win day
    </div>
  </div>

  <div id="warning" class="hidden bg-amber-600/20 border border-amber-400 p-4 rounded-2xl">
    ⚠️ Never miss twice. Get one win NOW.
  </div>

  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">Streak</h2>
    <div class="text-2xl font-bold">
      🔥 <span id="streak">0</span> days
    </div>
  </div>

  <div class="bg-slate-800 p-4 rounded-2xl">
    <h2 class="text-xl font-semibold mb-2">Reflection</h2>

    <textarea id="notes" class="w-full p-2 rounded text-black"
      placeholder="What mattered, what slipped, one adjustment"></textarea>
  </div>

</div>

<script>
const boxes = ["body","sobriety","career","mind"];
const scoreEl = document.getElementById("score");
const notes = document.getElementById("notes");
const streakEl = document.getElementById("streak");
const warningEl = document.getElementById("warning");

// Load checkboxes
boxes.forEach(id => {
  if(localStorage.getItem(id) === "true"){
    document.getElementById(id).checked = true;
  }
});

// Load notes
notes.value = localStorage.getItem("notes") || "";

// Save notes
notes.addEventListener("input", () => {
  localStorage.setItem("notes", notes.value);
});

// Handle boxes
boxes.forEach(id => {
  const el = document.getElementById(id);
  el.addEventListener("change", () => {
    localStorage.setItem(id, el.checked);
    updateScore();
  });
});

// Update score
function updateScore(){
  let score = 0;
  boxes.forEach(id => {
    if(document.getElementById(id).checked) score++;
  });

  scoreEl.textContent = score;

  checkWarning(score);
}

// Simple streak logic
function updateStreak(score){
  let streak = parseInt(localStorage.getItem("streak") || "0");

  if(score >= 3){
    streak++;
  } else {
    streak = 0;
  }

  localStorage.setItem("streak", streak);
  streakEl.textContent = streak;
}

// Warning logic
function checkWarning(score){
  if(score < 2){
    warningEl.classList.remove("hidden");
  } else {
    warningEl.classList.add("hidden");
  }
}

// Init
updateScore();
streakEl.textContent = localStorage.getItem("streak") || "0";
</script>

</body>
</html>
